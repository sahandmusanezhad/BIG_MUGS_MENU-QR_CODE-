<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منوی BIG MUGS</title>

    <meta name="theme-color" content="#0d2b23" />

    <!-- اتصال زودهنگام به سرورها — لود فونت و ثبت سفارش سریع‌تر می‌شه -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://bigmugs-order.sahand-mosanejad4488.workers.dev" />

    <!-- فونت وزیر از CDN -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 110px; /* جا برای نوار سبد خرید پایین صفحه */
            color: #ece3d0;
            background: linear-gradient(165deg, #0d2b23 0%, #0a231d 55%, #071a15 100%);
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 25px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
            border: 1px solid rgba(201, 164, 92, 0.35);
        }

        /* ======================================================
           هدر
           ====================================================== */
        .header {
            text-align: center;
            border-bottom: 1px solid rgba(201, 164, 92, 0.35);
            padding-bottom: 18px;
            margin-bottom: 10px;
        }

        .header .logo-container {
            margin-bottom: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header .logo-image {
            max-width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
        }

        .header .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 4px;
            direction: ltr; /* اسم لاتین برند نباید راست‌چین بشه */
            font-family: Georgia, 'Times New Roman', serif;
            letter-spacing: 7px;
        }

        .header .brand .big, .header .brand .mugs {
            background: linear-gradient(180deg, #eed9a3 0%, #c9a45c 45%, #a87f3e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header .brand .dot { color: #c9a45c; font-size: 1.6rem; }

        .cup { display: block; margin: 0 auto; }

        .menu-ribbon {
            display: inline-block;
            background: linear-gradient(135deg, #eed9a3, #c9a45c 45%, #a87f3e);
            color: #14100a;
            font-weight: 700;
            letter-spacing: 9px;
            padding: 7px 42px 7px 33px;
            margin-top: 12px;
            font-size: 0.9rem;
            direction: ltr;
            font-family: Georgia, 'Times New Roman', serif;
            clip-path: polygon(14px 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 14px 100%, 0 50%);
        }

        .header .subtitle {
            font-size: 0.9rem;
            color: #b9ac90;
            margin-top: 12px;
        }

        .header .subtitle span {
            background: rgba(201, 164, 92, 0.12);
            padding: 3px 18px;
            border-radius: 30px;
            display: inline-block;
        }

        /* ======================================================
           دسته‌بندی‌ها
           ====================================================== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            margin: 20px 0 25px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(201, 164, 92, 0.4);
            border-radius: 18px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .category-card:active { transform: scale(0.95); }

        .category-card.active {
            border-color: #eed9a3;
            background: linear-gradient(135deg, rgba(238, 217, 163, 0.95), rgba(168, 127, 62, 0.95));
            box-shadow: 0 0 20px rgba(201, 164, 92, 0.35);
        }

        .category-card .cat-icon { font-size: 1.8rem; display: block; }
        .category-card .cat-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: #e5d6b3;
            margin-top: 4px;
            display: block;
        }
        .category-card.active .cat-name { color: #14100a; }

        /* ======================================================
           منو
           ====================================================== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            margin: 20px 0 10px;
            min-height: 200px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(201, 164, 92, 0.3);
            border-radius: 18px;
            padding: 16px 10px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .menu-card.in-cart {
            border-color: #c9a45c;
            box-shadow: 0 0 0 3px rgba(201, 164, 92, 0.2);
        }

        /* جای عکس هر آیتم — اگه عکس نباشه آیکون دسته نشون داده می‌شه */
        .menu-photo {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            min-height: 110px;
            border-radius: 13px;
            overflow: hidden;
            margin-bottom: 10px;
            background: linear-gradient(145deg, rgba(201,164,92,0.16), rgba(201,164,92,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-photo img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-photo .ph-icon { font-size: 2.6rem; opacity: 0.55; }

        .menu-category {
            font-size: 0.65rem;
            background: rgba(201, 164, 92, 0.15);
            display: inline-block;
            padding: 0 14px;
            border-radius: 30px;
            color: #d9c08a;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .menu-name { font-weight: 700; font-size: 1.05rem; }
        .menu-price {
            font-weight: 600;
            color: #cfa95e;
            margin: 6px 0;
        }

        .btn-add {
            background: linear-gradient(135deg, #eed9a3, #c9a45c 45%, #a87f3e);
            color: #14100a;
            border: none;
            padding: 7px 22px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-add:active { transform: scale(0.94); }

        .qty-control {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(201, 164, 92, 0.12);
            border-radius: 30px;
            padding: 3px 8px;
        }
        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #c9a45c;
            color: #14100a;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        .qty-btn:active { transform: scale(0.9); }
        .qty-num { font-weight: 800; font-size: 1.05rem; min-width: 22px; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            grid-column: 1 / -1;
        }

        .footer {
            text-align: center;
            color: rgba(236, 227, 208, 0.45);
            font-size: 0.75rem;
            border-top: 1px solid rgba(201, 164, 92, 0.2);
            padding-top: 20px;
            margin-top: 20px;
        }

        /* ======================================================
           نوار سبد خرید (پایین صفحه)
           ====================================================== */
        .cart-bar {
            position: fixed;
            bottom: 14px;
            left: 14px;
            right: 14px;
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #eed9a3, #c9a45c 45%, #a87f3e);
            color: #14100a;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(140%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 90;
        }
        .cart-bar.show { transform: translateY(0); }

        .cart-info { display: flex; flex-direction: column; font-size: 0.85rem; }
        .cart-info b { font-size: 1.05rem; }

        .cart-open-btn {
            background: #0e2b24;
            color: #eed9a3;
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .cart-open-btn:active { transform: scale(0.96); }

        /* ======================================================
           صفحه‌ی سبد و ثبت سفارش
           ====================================================== */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 18, 8, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .sheet-overlay.show { opacity: 1; pointer-events: auto; }

        .cart-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: #0e2b24;
            border: 1px solid rgba(201, 164, 92, 0.4);
            border-bottom: none;
            border-radius: 28px 28px 0 0;
            padding: 14px 22px 26px;
            transform: translateY(105%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 110;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.25);
        }
        .cart-sheet.show { transform: translateY(0); }

        .sheet-handle {
            width: 44px;
            height: 5px;
            background: rgba(201, 164, 92, 0.5);
            border-radius: 10px;
            margin: 0 auto 14px;
        }

        .cart-sheet h3 { color: #ecd9a8; margin-bottom: 12px; }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px dashed rgba(201, 164, 92, 0.3);
            font-size: 0.95rem;
        }
        .cart-item-name { font-weight: 700; flex: 1; }
        .cart-item-price { color: #cfa95e; font-size: 0.85rem; white-space: nowrap; }

        .sheet-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 14px 0 6px;
            color: #ecd9a8;
        }

        .form-row { margin: 12px 0; }
        .form-row label {
            display: block;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #e5d6b3;
        }
        .form-row input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(201, 164, 92, 0.4);
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.06);
            color: #f3ead6;
        }
        .form-row input:focus {
            outline: none;
            border-color: #c9a45c;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #eed9a3, #c9a45c 45%, #a87f3e);
            color: #14100a;
            border: none;
            border-radius: 40px;
            padding: 15px;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled {
            background: rgba(201, 164, 92, 0.35);
            color: rgba(236, 227, 208, 0.6);
            cursor: wait;
        }

        .success-box {
            text-align: center;
            padding: 30px 10px;
            display: none;
        }
        .success-box.show { display: block; }
        .success-box .success-icon { font-size: 3.5rem; }
        .success-box h3 { margin: 10px 0 6px; }
        .success-box p { color: #b9ac90; font-size: 0.9rem; }

        /* ======================================================
           Toast
           ====================================================== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d6a4f;
            color: white;
            padding: 13px 34px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 8px 30px rgba(45,106,79,0.3);
            font-family: inherit;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #b13e3e; box-shadow: 0 8px 30px rgba(177,62,62,0.3); }

        /* ======================================================
           ریسپانسیو
           ====================================================== */
        @media (max-width: 768px) {
            body { padding: 10px; padding-bottom: 100px; }
            .container { padding: 15px; }
            .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .header .brand { font-size: 2rem; }
            .header .logo-image { max-width: 130px; }
        }

        @media (max-width: 480px) {
            .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .menu-card { padding: 12px 8px; }
            .menu-name { font-size: 0.9rem; }
            .menu-photo { min-height: 90px; }
            .categories-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .category-card { padding: 12px 6px; }
            .category-card .cat-icon { font-size: 1.5rem; }
            .category-card .cat-name { font-size: 0.7rem; }
            .header .brand { font-size: 1.6rem; }
            .header .logo-image { max-width: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-container">
            <svg id="cupSvg" class="cup" width="62" height="58" viewBox="0 0 64 60" fill="none">
                <path d="M24 5 q3 5 0 10" stroke="#c9a45c" stroke-width="2" stroke-linecap="round" fill="none" />
                <path d="M32 3 q3 6 0 12" stroke="#c9a45c" stroke-width="2" stroke-linecap="round" fill="none" />
                <path d="M40 5 q3 5 0 10" stroke="#c9a45c" stroke-width="2" stroke-linecap="round" fill="none" />
                <path d="M16 23 h32 v9 a16 15 0 0 1 -32 0 z" stroke="#c9a45c" stroke-width="2.5" fill="none" />
                <path d="M48 26 h3 a6 6 0 0 1 0 12 h-4" stroke="#c9a45c" stroke-width="2.5" fill="none" />
                <path d="M14 53 h36" stroke="#c9a45c" stroke-width="2.5" stroke-linecap="round" />
            </svg>
            <img src="logo-bigmugs.webp" alt="BIG MUGS" class="logo-image" style="display:none"
                 onload="this.style.display='block'; document.getElementById('cupSvg').style.display='none';" />
        </div>
        <div class="brand">
            <span class="big">BIG</span>
            <span class="dot">•</span>
            <span class="mugs">MUGS</span>
        </div>
        <div><span class="menu-ribbon">MENU</span></div>
        <div class="subtitle">
            <span>☕ منوی دیجیتال · سفارش از میز</span>
        </div>
    </div>

    <div class="categories-grid" id="categoriesGrid"></div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="footer">
        از دکمه‌ی «افزودن» آیتم‌ها رو انتخاب کن، بعد پایین صفحه سفارشت رو ثبت کن ☕
    </div>
</div>

<!-- نوار سبد خرید -->
<div class="cart-bar" id="cartBar">
    <div class="cart-info">
        <b id="cartTotal">۰ تومان</b>
        <span id="cartCount">۰ آیتم</span>
    </div>
    <button class="cart-open-btn" onclick="openCart()">🧾 مشاهده و ثبت سفارش</button>
</div>

<!-- صفحه‌ی سبد -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeCart()"></div>
<div class="cart-sheet" id="cartSheet">
    <div class="sheet-handle"></div>

    <div id="cartForm">
        <h3>🧾 سفارش شما</h3>
        <div id="cartItems"></div>
        <div class="sheet-total">
            <span>جمع کل</span>
            <span id="sheetTotal">۰ تومان</span>
        </div>

        <div class="form-row">
            <label for="tableInput">🪑 شماره میز</label>
            <input id="tableInput" type="number" inputmode="numeric" min="1" max="99" placeholder="مثلاً ۵" />
        </div>
        <div class="form-row">
            <label for="noteInput">📝 یادداشت (اختیاری)</label>
            <input id="noteInput" type="text" maxlength="200" placeholder="مثلاً: لاته بدون شکر" />
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitOrder()">✅ ثبت سفارش</button>
    </div>

    <div class="success-box" id="successBox">
        <div class="success-icon">☕</div>
        <h3>سفارشت ثبت شد!</h3>
        <p id="successMsg">تا چند دقیقه‌ی دیگه آماده می‌شه</p>
    </div>
</div>

<div class="toast" id="toast">✅</div>

<script>

        { name: 'شات اسپرسو اضافه', price: 90000, category: 'اضافات', img: '' },

    let CATEGORIES = [
        { id: 'all', name: 'همه', icon: '📋' },
        { id: 'قهوه', name: 'قهوه', icon: '☕' },
        { id: 'نوشیدنی سرد', name: 'نوشیدنی سرد', icon: '🧊' },
        { id: 'نوشیدنی گرم', name: 'نوشیدنی گرم', icon: '☕' },
        { id: 'میلکشیک', name: 'میلکشیک', icon: '🥤' },
        { id: 'موکتل', name: 'موکتل', icon: '🍹' },
        { id: 'چای و دمنوش', name: 'چای و دمنوش', icon: '🍵' },
        { id: 'اضافات', name: 'Extra', icon: '➕' },
        { id: 'کیک', name: 'کیک', icon: '🍰' },
    ];
</script>
<script>
    // ============================================================
    //  محافظ: اگه موقع ویرایش لیست منو خطای تایپی پیش بیاد
    //  (مثلاً ویرگول جا بیفته)، به‌جای صفحه‌ی سفید این پیام میاد
    // ============================================================
    if (typeof MENU === 'undefined' || typeof CATEGORIES === 'undefined' || !Array.isArray(MENU)) {
        document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;color:#ece3d0;"><div style="font-size:3.5rem;">☕</div><h2 style="margin:14px 0 8px;">منو موقتاً در دسترس نیست</h2><p style="opacity:0.7;">لطفاً سفارشتون رو مستقیم به صندوق بگید 🙏</p></div>';
        throw new Error('MENU is broken — check the menu list in the first script block for syntax errors');
    }

    // ============================================================
    //  سبد خرید — کلیدش ایندکس آیتم توی MENU است
    // ============================================================
    const CART_KEY = 'bigmugs_cart_v1';
    let cart = {};
    try { cart = JSON.parse(localStorage.getItem(CART_KEY)) || {}; } catch { cart = {}; }

    function saveCart() {
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function cartItems() {
        return Object.entries(cart)
            .filter(([i, qty]) => qty > 0 && MENU[i])
            .map(([i, qty]) => ({ ...MENU[i], qty }));
    }

    function cartTotals() {
        const items = cartItems();
        return {
            count: items.reduce((s, it) => s + it.qty, 0),
            total: items.reduce((s, it) => s + it.qty * it.price, 0),
        };
    }

    function fmt(n) {
        return n.toLocaleString('fa-IR');
    }

    function priceLabel(price) {
        return price > 0 ? fmt(price) + ' تومان' : 'قیمت روز';
    }

    function changeQty(index, delta) {
        cart[index] = Math.max(0, Math.min(50, (cart[index] || 0) + delta));
        if (cart[index] === 0) delete cart[index];
        saveCart();
        renderCardControls(index);
        renderCartBar();
        if (document.getElementById('cartSheet').classList.contains('show')) {
            renderCartSheet();
        }
    }

    // ============================================================
    //  رندر دسته‌بندی‌ها و منو
    // ============================================================
    let activeCategory = 'all';

    function renderCategories() {
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = CATEGORIES.map(cat => {
            const activeClass = activeCategory === cat.id ? 'active' : '';
            return `
                <div class="category-card ${activeClass}" onclick="selectCategory('${cat.id}')">
                    <span class="cat-icon">${cat.icon}</span>
                    <span class="cat-name">${cat.name}</span>
                </div>
            `;
        }).join('');
    }

    function selectCategory(categoryId) {
        activeCategory = categoryId;
        renderCategories();
        renderMenu();
        document.getElementById('menuGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function catIcon(category) {
        const c = CATEGORIES.find(x => x.id === category);
        return c ? c.icon : '☕';
    }

    function catName(category) {
        const c = CATEGORIES.find(x => x.id === category);
        return c ? c.name : category;
    }

    function photoHTML(item) {
        const icon = `<span class="ph-icon">${catIcon(item.category)}</span>`;
        if (!item.img) return `<div class="menu-photo">${icon}</div>`;
        return `<div class="menu-photo">${icon}<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.remove()" /></div>`;
    }

    function controlsHTML(index) {
        const qty = cart[index] || 0;
        if (qty === 0) {
            return `<button class="btn-add" onclick="changeQty(${index}, 1)">➕ افزودن</button>`;
        }
        return `
            <span class="qty-control">
                <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                <span class="qty-num">${fmt(qty)}</span>
                <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            </span>
        `;
    }

    function renderCardControls(index) {
        const holder = document.getElementById('ctrl-' + index);
        if (holder) holder.innerHTML = controlsHTML(index);
        const card = document.getElementById('card-' + index);
        if (card) card.classList.toggle('in-cart', (cart[index] || 0) > 0);
    }

    function renderMenu() {
        const grid = document.getElementById('menuGrid');

        const indices = MENU
            .map((item, i) => ({ item, i }))
            .filter(({ item }) => activeCategory === 'all' || item.category === activeCategory);

        if (indices.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <span style="font-size:3rem;display:block;">📭</span>
                    <p style="margin-top:10px;">هیچ محصولی در این دسته وجود ندارد</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = indices.map(({ item, i }) => `
            <div class="menu-card ${(cart[i] || 0) > 0 ? 'in-cart' : ''}" id="card-${i}">
                ${photoHTML(item)}
                <div class="menu-category">${catName(item.category)}</div>
                <div class="menu-name">${item.name}</div>
                <div class="menu-price">${priceLabel(item.price)}</div>
                <div id="ctrl-${i}">${controlsHTML(i)}</div>
            </div>
        `).join('');
    }

    // ============================================================
    //  نوار و صفحه‌ی سبد
    // ============================================================
    function renderCartBar() {
        const { count, total } = cartTotals();
        const bar = document.getElementById('cartBar');
        bar.classList.toggle('show', count > 0);
        document.getElementById('cartTotal').textContent = fmt(total) + ' تومان';
        document.getElementById('cartCount').textContent = fmt(count) + ' آیتم';
    }

    function renderCartSheet() {
        const items = cartItems();
        const { total } = cartTotals();
        const box = document.getElementById('cartItems');

        if (items.length === 0) {
            closeCart();
            return;
        }

        box.innerHTML = items.map(it => {
            const index = MENU.findIndex(m => m.name === it.name && m.category === it.category);
            return `
                <div class="cart-item">
                    <span class="cart-item-name">${it.name} <span style="color:#aaa;font-size:0.75rem;">· ${catName(it.category)}</span></span>
                    <span class="cart-item-price">${it.price > 0 ? fmt(it.qty * it.price) : 'قیمت روز'}</span>
                    <span class="qty-control">
                        <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                        <span class="qty-num">${fmt(it.qty)}</span>
                        <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
                    </span>
                </div>
            `;
        }).join('');

        document.getElementById('sheetTotal').textContent = fmt(total) + ' تومان';
    }

    function openCart() {
        document.getElementById('successBox').classList.remove('show');
        document.getElementById('cartForm').style.display = 'block';
        renderCartSheet();
        document.getElementById('sheetOverlay').classList.add('show');
        document.getElementById('cartSheet').classList.add('show');
    }

    function closeCart() {
        document.getElementById('sheetOverlay').classList.remove('show');
        document.getElementById('cartSheet').classList.remove('show');
    }

    // ============================================================
    //  ارسال سفارش به تلگرام (از طریق Worker)
    // ============================================================
    async function submitOrder() {
        const table = document.getElementById('tableInput').value.trim();
        const note = document.getElementById('noteInput').value.trim();
        const items = cartItems();

        if (items.length === 0) { showToast('⚠️ سبد خالیه', true); return; }
        if (!table) {
            showToast('⚠️ شماره میز رو وارد کن', true);
            document.getElementById('tableInput').focus();
            return;
        }
        if (!ORDER_ENDPOINT) {
            showToast('⚠️ آدرس سرور سفارش هنوز تنظیم نشده', true);
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = '⏳ در حال ارسال…';

        try {
            const res = await fetch(ORDER_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    table: table,
                    note: note,
                    items: items.map(it => ({ name: it.name, category: it.category, qty: it.qty, price: it.price })),
                }),
            });
            if (!res.ok) throw new Error('server error ' + res.status);

            cart = {};
            saveCart();
            renderMenu();
            renderCartBar();

            document.getElementById('cartForm').style.display = 'none';
            document.getElementById('successMsg').textContent = 'سفارش میز ' + fmt(parseInt(table) || 0) + ' به کافه رسید — تا چند دقیقه‌ی دیگه آماده می‌شه';
            document.getElementById('successBox').classList.add('show');
            document.getElementById('noteInput').value = '';
            setTimeout(closeCart, 3500);
        } catch (err) {
            showToast('❌ ارسال نشد — اینترنتت رو چک کن و دوباره بزن', true);
        } finally {
            btn.disabled = false;
            btn.textContent = '✅ ثبت سفارش';
        }
    }

    // ============================================================
    //  Toast
    // ============================================================
    let toastTimer;
    function showToast(msg, isError) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.toggle('error', !!isError);
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    // ============================================================
    //  همگام‌سازی منو با سرور — اگه صاحب کافه از پنل مدیریت
    //  (admin.html) منو رو عوض کرده باشه، نسخه‌ی جدید همین‌جا
    //  جایگزین می‌شه. لیست بالای همین فایل فقط نسخه‌ی پشتیبانه.
    // ============================================================
    async function loadServerMenu() {
        if (!ORDER_ENDPOINT) return;
        try {
            const res = await fetch(ORDER_ENDPOINT + '/menu');
            const data = await res.json();
            const d = data && data.data;
            if (!d || !Array.isArray(d.menu) || !d.menu.length) return;

            const sig = (m) => JSON.stringify(m.map(x => [x.name, x.category, x.price, x.img || '']));
            if (sig(d.menu) === sig(MENU)) return; // فرقی با منوی داخل فایل نداره

            MENU = d.menu;
            if (Array.isArray(d.categories) && d.categories.length) {
                CATEGORIES = [{ id: 'all', name: 'همه', icon: '📋' }].concat(d.categories);
            }
            cart = {}; // ترتیب آیتم‌ها ممکنه عوض شده باشه
            saveCart();
            if (activeCategory !== 'all' && !CATEGORIES.some(c => c.id === activeCategory)) {
                activeCategory = 'all';
            }
            renderCategories();
            renderMenu();
            renderCartBar();
        } catch {
            /* سرور در دسترس نیست — منوی داخل فایل نمایش داده می‌شه */
        }
    }

    // ============================================================
    //  اجرا
    // ============================================================
    renderCategories();
    renderMenu();
    renderCartBar();
    loadServerMenu();
</script>
