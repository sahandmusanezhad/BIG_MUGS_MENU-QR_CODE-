<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIG MUGS | منوی کافه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b2226;
    --bg-2:#123236;
    --panel:rgba(255,255,255,.025);
    --panel-line:rgba(214,178,100,.16);
    --gold:#d6b264;
    --gold-bright:#e9cd8c;
    --gold-soft:rgba(214,178,100,.4);
    --gold-faint:rgba(214,178,100,.12);
    --cream:#f0efe6;
    --muted:#9fb4b0;
    --danger:#e08a7a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1200px 560px at 50% -220px, #17403f 0%, transparent 62%),
      radial-gradient(900px 460px at 110% 105%, #143336 0%, transparent 55%),
      var(--bg);
    color:var(--cream);
    font-family:"Vazirmatn",system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:90px;
    overflow-x:hidden;
  }

  /* ---------- gold page frame ---------- */
  .frame{
    position:fixed; inset:10px; z-index:40; pointer-events:none;
    border:1px solid rgba(214,178,100,.28);
    border-radius:6px;
  }
  .frame i{
    position:absolute; width:22px; height:22px;
    border:1px solid var(--gold);
  }
  .frame i:nth-child(1){ top:-1px; right:-1px; border-left:none; border-bottom:none; border-top-right-radius:6px;}
  .frame i:nth-child(2){ top:-1px; left:-1px;  border-right:none; border-bottom:none; border-top-left-radius:6px;}
  .frame i:nth-child(3){ bottom:-1px; right:-1px; border-left:none; border-top:none; border-bottom-right-radius:6px;}
  .frame i:nth-child(4){ bottom:-1px; left:-1px; border-right:none; border-top:none; border-bottom-left-radius:6px;}
  @media (max-width:480px){ .frame{ inset:7px; } }

  /* ---------- header ---------- */
  header{ text-align:center; padding:52px 16px 8px; position:relative; }
  .cup{ width:74px; height:auto; margin-bottom:6px; opacity:.95; }
  .cup .steam{ stroke-dasharray:60; stroke-dashoffset:60; animation:steam 2.6s ease forwards; }
  .cup .steam.s2{ animation-delay:.45s; }
  @keyframes steam{ to{ stroke-dashoffset:0; } }
  .brand{
    font-family:"Cormorant Garamond",serif;
    font-weight:700;
    font-size:clamp(2.5rem,10vw,3.6rem);
    letter-spacing:.16em;
    line-height:1.05;
    direction:ltr;
    background:linear-gradient(180deg, #f4ead2 20%, var(--gold) 85%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:var(--gold);
    text-shadow:0 0 34px rgba(214,178,100,.16);
  }
  .ribbon{
    display:inline-block; position:relative;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    color:#12292d;
    font-family:"Cormorant Garamond",serif;
    font-weight:700; letter-spacing:.6em; text-indent:.6em;
    direction:ltr; font-size:.95rem;
    padding:7px 30px; margin-top:12px;
    clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 50%,calc(100% - 12px) 100%,12px 100%,0 50%);
    box-shadow:0 6px 22px rgba(0,0,0,.35);
  }
  .unit-note{ margin-top:16px; color:var(--muted); font-size:.8rem; letter-spacing:.02em; }
  .ornament{
    display:flex; align-items:center; justify-content:center; gap:12px;
    margin:18px auto 4px; color:var(--gold); opacity:.85;
  }
  .ornament::before,.ornament::after{
    content:""; width:min(120px,26vw); height:1px;
    background:linear-gradient(to var(--dir,left), var(--gold-soft), transparent);
  }
  .ornament::before{ --dir:right; }
  .diamond{ font-size:.7rem; transform:rotate(45deg); display:inline-block; }

  /* ---------- nav chips ---------- */
  nav{
    position:sticky; top:0; z-index:20;
    background:rgba(10,29,32,.86);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--gold-faint);
    padding:11px 14px;
    display:flex; gap:8px; overflow-x:auto;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  nav a{
    flex:0 0 auto;
    color:var(--gold);
    border:1px solid var(--gold-soft);
    border-radius:999px;
    padding:7px 18px;
    font-size:.83rem;
    text-decoration:none;
    white-space:nowrap;
    transition:background .25s,color .25s,border-color .25s;
  }
  nav a.active{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    color:#12292d; font-weight:700; border-color:transparent;
  }
  nav a:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  /* ---------- menu ---------- */
  main{ max-width:660px; margin:0 auto; padding:26px 18px 0; position:relative; }
  section.cat{
    margin-bottom:26px; scroll-margin-top:72px;
    background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.008));
    border:1px solid var(--panel-line);
    border-radius:20px;
    padding:22px 22px 18px;
    box-shadow:0 18px 40px -24px rgba(0,0,0,.55);
    position:relative;
  }
  section.cat::before{
    content:""; position:absolute; inset:6px;
    border:1px solid rgba(214,178,100,.07);
    border-radius:15px; pointer-events:none;
  }
  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:none; }
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    .reveal{ opacity:1; transform:none; transition:none; }
    .cup .steam{ animation:none; stroke-dashoffset:0; }
  }

  .cat-head{ text-align:center; margin-bottom:14px; }
  .cat-title{
    font-family:"Cormorant Garamond",serif;
    font-weight:700; font-size:1.85rem;
    color:var(--gold); letter-spacing:.06em; direction:ltr;
  }
  .cat-title-fa{ color:var(--muted); font-size:.8rem; margin-top:2px; letter-spacing:.05em; }
  .cat-divider{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-top:10px; color:var(--gold); font-size:.55rem;
  }
  .cat-divider::before,.cat-divider::after{
    content:""; height:1px; width:56px;
    background:linear-gradient(to var(--d,left), var(--gold-soft), transparent);
  }
  .cat-divider::before{ --d:right; }

  ul.items{ list-style:none; }
  li.item{
    display:flex; align-items:baseline;
    padding:10px 6px;
    font-size:.98rem;
    border-radius:10px;
    transition:background .2s;
  }
  li.item:hover{ background:rgba(214,178,100,.05); }
  .i-name{ font-weight:400; }
  .leader{
    flex:1; margin:0 12px; min-width:26px;
    border-bottom:1px dotted var(--gold-soft);
    transform:translateY(-5px);
  }
  .i-price{
    color:var(--gold-bright); font-weight:600;
    letter-spacing:.03em; white-space:nowrap;
    font-size:1.02rem;
  }

  footer{ text-align:center; color:var(--muted); font-size:.75rem; padding:34px 16px 24px; }
  footer .fdiv{ color:var(--gold); opacity:.7; margin-bottom:10px; letter-spacing:.6em; text-indent:.6em; }
  footer .admin-link{
    color:rgba(159,180,176,.5);
    text-decoration:none; font-size:.72rem;
    display:inline-block; margin-top:12px;
  }

  /* ---------- edit mode ---------- */
  body.editing .leader{ display:none; }
  body.editing li.item{ gap:8px; }
  .e-input{
    background:rgba(9,26,29,.8);
    border:1px solid rgba(214,178,100,.28);
    color:var(--cream);
    border-radius:9px;
    padding:8px 10px;
    font:inherit; font-size:.9rem;
    min-width:0;
  }
  .e-input:focus{ outline:2px solid var(--gold-soft); }
  .e-name{ flex:1; }
  .e-price{ width:88px; text-align:center; direction:ltr; }
  .e-del{
    background:none; border:none; cursor:pointer;
    color:var(--danger); font-size:1.05rem; padding:4px 6px;
  }
  .e-head{ display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
  .e-cat-name{ width:150px; direction:ltr; text-align:center; font-family:"Cormorant Garamond",serif; font-size:1.1rem; color:var(--gold); }
  .e-del-cat{
    color:var(--danger); background:none; cursor:pointer;
    border:1px solid rgba(224,138,122,.4); border-radius:8px;
    padding:5px 12px; font:inherit; font-size:.75rem;
  }
  .e-add,.e-add-cat{
    background:none; cursor:pointer;
    border:1px dashed var(--gold-soft);
    color:var(--gold); border-radius:12px;
    padding:9px 16px; font:inherit; font-size:.85rem;
    margin-top:10px;
  }
  .e-add-cat{ display:block; margin:4px auto 24px; }

  .toolbar{
    position:fixed; bottom:0; right:0; left:0; z-index:50;
    display:none; gap:10px; justify-content:center; flex-wrap:wrap;
    background:rgba(9,26,29,.97);
    border-top:1px solid var(--gold-soft);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  }
  body.editing .toolbar{ display:flex; }
  .toolbar button{
    font:inherit; font-size:.9rem; cursor:pointer;
    border-radius:11px; padding:11px 20px; border:none;
  }
  .btn-save{ background:linear-gradient(180deg, var(--gold-bright), var(--gold)); color:#12292d; font-weight:700; box-shadow:0 8px 24px rgba(214,178,100,.25); }
  .btn-exit{ background:transparent; color:var(--muted); border:1px solid rgba(159,180,176,.4); }
  .edit-hint{
    display:none; max-width:640px; margin:16px auto 0; padding:0 18px;
    color:var(--muted); font-size:.78rem; line-height:2; text-align:center;
  }
  body.editing .edit-hint{ display:block; }
</style>
</head>

<script>
(function(){
  // Snapshot of the page as shipped — used to export an updated copy of this same file.
  var ORIGINAL_HTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

  var data = window.MENU_DATA;
  var editing = false;
  var observer = null;
  var navObserver = null;

  var faDigits = "۰۱۲۳۴۵۶۷۸۹";
  function toFa(n){ return String(n).replace(/\d/g, function(d){ return faDigits[d]; }); }
  function slug(i){ return "cat-" + i; }
  function el(tag, cls){ var e = document.createElement(tag); if (cls) e.className = cls; return e; }

  function render(){
    document.body.classList.toggle("editing", editing);
    document.getElementById("unitNote").textContent = data.unitNote || "";
    if (observer) observer.disconnect();
    if (navObserver) navObserver.disconnect();

    // nav
    var nav = document.getElementById("nav");
    nav.innerHTML = "";
    data.categories.forEach(function(cat, i){
      var a = document.createElement("a");
      a.href = "#" + slug(i);
      a.id = "navlink-" + i;
      a.textContent = cat.titleFa || cat.title;
      nav.appendChild(a);
    });

    // menu
    var main = document.getElementById("menu");
    main.innerHTML = "";
    data.categories.forEach(function(cat, ci){
      var sec = el("section", "cat reveal");
      sec.id = slug(ci);

      if (editing){
        var head = el("div","e-head");
        var tIn = el("input", "e-input e-cat-name"); tIn.value = cat.title;
        tIn.oninput = function(){ cat.title = tIn.value; };
        var fIn = el("input", "e-input"); fIn.value = cat.titleFa || ""; fIn.placeholder = "نام فارسی";
        fIn.style.width = "130px"; fIn.style.fontSize = ".8rem";
        fIn.oninput = function(){ cat.titleFa = fIn.value; };
        var delC = el("button", "e-del-cat"); delC.type = "button"; delC.textContent = "حذف دسته";
        delC.onclick = function(){
          if (confirm("دستهٔ «" + (cat.titleFa || cat.title) + "» با همهٔ آیتم‌هایش حذف شود؟")){
            data.categories.splice(ci,1); render();
          }
        };
        head.append(tIn, fIn, delC);
        sec.appendChild(head);
      } else {
        var head2 = el("div","cat-head");
        var t = el("div","cat-title"); t.textContent = cat.title;
        var tf = el("div","cat-title-fa"); tf.textContent = cat.titleFa || "";
        var dv = el("div","cat-divider"); dv.textContent = "◆";
        head2.append(t, tf, dv);
        sec.appendChild(head2);
      }

      var ul = el("ul","items");
      cat.items.forEach(function(item, ii){
        var li = el("li","item");
        if (editing){
          var nIn = el("input","e-input e-name"); nIn.value = item.name;
          nIn.oninput = function(){ item.name = nIn.value; };
          var pIn = el("input","e-input e-price");
          pIn.type = "number"; pIn.inputMode = "numeric"; pIn.placeholder = "قیمت";
          pIn.value = (item.price == null ? "" : item.price);
          pIn.oninput = function(){ item.price = pIn.value === "" ? null : Number(pIn.value); };
          var del = el("button","e-del"); del.type = "button"; del.textContent = "✕";
          del.setAttribute("aria-label","حذف آیتم");
          del.onclick = function(){ cat.items.splice(ii,1); render(); };
          li.append(nIn, pIn, del);
        } else {
          var nm = el("span","i-name"); nm.textContent = item.name;
          var pr = el("span","i-price");
          pr.textContent = (item.price == null || item.price === "") ? "—" : toFa(item.price);
          li.append(nm, el("span","leader"), pr);
        }
        ul.appendChild(li);
      });
      sec.appendChild(ul);

      if (editing){
        var add = el("button","e-add"); add.type = "button"; add.textContent = "+ آیتم جدید";
        add.onclick = function(){
          cat.items.push({name:"", price:null}); render();
          var s = document.getElementById(slug(ci));
          var inputs = s.querySelectorAll(".e-name");
          if (inputs.length) inputs[inputs.length-1].focus();
        };
        sec.appendChild(add);
      }
      main.appendChild(sec);
    });

    if (editing){
      var addCat = el("button","e-add-cat"); addCat.type = "button"; addCat.textContent = "＋ دستهٔ جدید";
      addCat.onclick = function(){
        data.categories.push({title:"New", titleFa:"", items:[{name:"", price:null}]});
        render();
      };
      main.appendChild(addCat);
    }

    setupReveal();
    setupNavHighlight();
  }

  function setupReveal(){
    var els = document.querySelectorAll(".reveal");
    if (!("IntersectionObserver" in window)){
      els.forEach(function(e){ e.classList.add("in"); });
      return;
    }
    observer = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if (en.isIntersecting){ en.target.classList.add("in"); observer.unobserve(en.target); }
      });
    }, {threshold:.08});
    els.forEach(function(e){ observer.observe(e); });
  }

  function setupNavHighlight(){
    if (!("IntersectionObserver" in window)) return;
    navObserver = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if (en.isIntersecting){
          var i = en.target.id.split("-")[1];
          document.querySelectorAll("nav a").forEach(function(a){ a.classList.remove("active"); });
          var link = document.getElementById("navlink-" + i);
          if (link){
            link.classList.add("active");
            link.scrollIntoView({block:"nearest", inline:"center", behavior:"smooth"});
          }
        }
      });
    }, {rootMargin:"-30% 0px -60% 0px"});
    document.querySelectorAll("section.cat").forEach(function(s){ navObserver.observe(s); });
  }

  function exportFile(){
    var json = JSON.stringify(data, null, 2).replace(/</g, "\\u003c");
    var replaced = ORIGINAL_HTML.replace(
      /\/\*MENU-DATA-START\*\/[\s\S]*?\/\*MENU-DATA-END\*\//,
      "/*MENU-DATA-START*/\nwindow.MENU_DATA = " + json + ";\n/*MENU-DATA-END*/"
    );
    var blob = new Blob([replaced], {type:"text/html;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "big-mugs-menu.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 4000);
    alert("فایل جدید دانلود شد. آن را جای فایل قبلی روی هاست آپلود کن تا تغییرات برای مشتری‌ها اعمال شود.");
  }

  document.getElementById("adminLink").addEventListener("click", function(e){
    e.preventDefault();
    editing = true; render();
    window.scrollTo({top:0});
  });
  document.getElementById("btnExit").addEventListener("click", function(){
    if (confirm("تغییرات ذخیره‌نشده از بین می‌رود. خارج شوی؟")){ location.reload(); }
  });
  document.getElementById("btnSave").addEventListener("click", exportFile);

  if (location.hash === "#edit"){ editing = true; }
  render();
})();
</script>
</body>
</html>
